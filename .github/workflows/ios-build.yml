name: iOS Build (Flutter)

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  ios-build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS app for simulator (no signing)
        run: flutter build ios --simulator --debug

      - name: Pack simulator app for appetize.io
        run: |
          cd build/ios/iphonesimulator
          zip -r ios-simulator-appetize.zip Runner.app

      - name: Upload artifact (appetize zip)
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-appetize
          path: build/ios/iphonesimulator/ios-simulator-appetize.zip

      - name: Build iOS release app (no signing)
        run: flutter build ios --release --no-codesign

      - name: Pack unsigned IPA manually
        run: |
          mkdir -p build/ios/unsigned-ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/unsigned-ipa/Payload/
          cd build/ios/unsigned-ipa
          zip -r app-unsigned.ipa Payload

      - name: Upload artifact (unsigned ipa)
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa-unsigned
          path: build/ios/unsigned-ipa/app-unsigned.ipa
