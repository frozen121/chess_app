name: iOS Build (Flutter)

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS app for simulator (no signing)
        run: flutter build ios --simulator --debug

      - name: Pack simulator app for appetize.io
        run: |
          cd build/ios/iphonesimulator
          zip -r ios-simulator-appetize.zip Runner.app

      - name: Upload artifact (appetize zip)
        uses: actions/upload-artifact@v5
        with:
          name: ios-simulator-appetize
          path: build/ios/iphonesimulator/ios-simulator-appetize.zip
